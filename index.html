<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmony Rest & Comfort Beds | Luxury Sleep Experience</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Link to your external CSS file -->
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* Only keep styles that are NOT in style.css */
    /* Remove all header styles since they're now in style.css */
    
    /* ========== RESET & BASE ========== */
    /* These might already be in style.css - check and remove duplicates */
    
    /* Keep only page-specific styles that aren't in your global CSS */
    
    /* ========== HERO SECTION ========== */
    .hero {
      background: linear-gradient(145deg, var(--soft-white) 0%, #ffffff 70%);
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 3rem;
    }

    .hero-content h1 {
      margin-bottom: 1.5rem;
    }

    .hero-content p {
      font-size: 1.2rem;
      color: #4b4742;
      margin-bottom: 2.5rem;
      max-width: 90%;
    }

    .hero-stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .stat-item h3 {
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--gold-deep);
    }

    .stat-item p {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #77715b;
    }

    .hero-image {
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500"><rect width="600" height="500" fill="%23f5efe6"/><circle cx="400" cy="150" r="80" fill="%23e0cda4" opacity="0.3"/><circle cx="200" cy="350" r="120" fill="%23c6a45c" opacity="0.15"/><path d="M160 280 L440 280 L480 380 L120 380 Z" fill="%23c6a45c" opacity="0.2"/><rect x="180" y="200" width="240" height="150" rx="20" fill="%23ffffff" stroke="%23c6a45c" stroke-width="2"/><rect x="210" y="230" width="180" height="30" rx="8" fill="%23c6a45c" opacity="0.5"/><rect x="210" y="280" width="180" height="30" rx="8" fill="%23c6a45c" opacity="0.3"/></svg>');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      min-height: 400px;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    /* ========== BED COLLECTION ========== */
    .collection-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2.5rem;
      margin-top: 2rem;
    }

    .bed-card {
      background: var(--white);
      padding: 2rem 1.5rem 1.8rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s;
      border: 1px solid rgba(198, 164, 92, 0.15);
      border-radius: 4px;
      text-align: center;
    }

    .bed-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.05);
    }

    .bed-icon {
      font-size: 3.2rem;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    .bed-card h3 {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.8rem;
    }

    .bed-desc {
      color: #6a655c;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .price {
      font-size: 1.5rem;
      color: var(--charcoal);
      font-weight: 400;
      border-top: 1px dashed var(--gold-light);
      padding-top: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .price small {
      font-size: 0.9rem;
      color: #a6a08f;
    }

    .btn-card {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--charcoal);
      padding: 0.7rem 2rem;
      text-decoration: none;
      transition: 0.2s;
      font-size: 0.95rem;
    }

    .btn-card:hover {
      background: var(--gold);
      color: white;
    }

    /* ========== CRAFT SECTION ========== */
    .craft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .craft-text h2 {
      margin-bottom: 1.8rem;
    }

    .craft-text p {
      color: #4b4742;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    .signature {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 2.5rem;
    }

    .signature-img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--gold-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
    }

    .craft-image {
      background: linear-gradient(130deg, var(--cream), #fff);
      padding: 2rem;
      border-radius: 100px 100px 30px 30px;
      text-align: center;
      border: 2px solid var(--gold-light);
    }

    .craft-image i {
      font-size: 12rem;
      color: var(--gold);
      opacity: 0.7;
    }

    /* ========== TESTIMONIAL ========== */
    .testimonial {
      background: var(--white);
    }

    .testimonial-card {
      max-width: 850px;
      margin: 0 auto;
      text-align: center;
      padding: 3rem;
      background: var(--cream);
      border-radius: 4px;
      position: relative;
    }

    .testimonial-card i {
      font-size: 3rem;
      color: var(--gold-light);
      margin-bottom: 1rem;
    }

    .testimonial-card p {
      font-size: 1.4rem;
      font-weight: 300;
      line-height: 1.6;
      color: #2e2a24;
      margin-bottom: 2rem;
    }

    .customer {
      font-weight: 400;
      color: var(--gold-deep);
      letter-spacing: 1px;
    }

    /* ========== NEWSLETTER ========== */
    .newsletter {
      background: var(--gold);
      color: white;
      text-align: center;
    }

    .newsletter h2 {
      color: white;
      margin-bottom: 1rem;
    }

    .newsletter h2:after {
      background: white;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
    }

    .newsletter p {
      margin-bottom: 2.5rem;
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .newsletter-form {
      display: flex;
      max-width: 500px;
      margin: 0 auto;
    }

    .newsletter-form input {
      flex: 1;
      padding: 1rem;
      border: none;
      outline: none;
      font-size: 1rem;
      background: white;
    }

    .newsletter-form button {
      background: var(--charcoal);
      color: white;
      border: none;
      padding: 0 2.5rem;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid var(--charcoal);
    }

    .newsletter-form button:hover {
      background: transparent;
      color: var(--charcoal);
      border: 1px solid var(--charcoal);
    }

    /* ========== FOOTER ========== */
    footer {
      background: var(--charcoal);
      color: #ddd6cb;
      padding: 3rem 0 2rem;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr;
      gap: 2.5rem;
    }

    .footer-col p {
      margin: 1.5rem 0;
      font-size: 0.95rem;
      line-height: 1.7;
      opacity: 0.9;
    }

    .footer-logo {
      font-size: 2rem;
      color: white;
      font-weight: 300;
    }

    .footer-logo span {
      color: var(--gold);
    }

    .social {
      display: flex;
      gap: 1.2rem;
      margin-top: 1.5rem;
    }

    .social a {
      color: var(--gold-light);
      font-size: 1.2rem;
      transition: color 0.2s;
    }

    .social a:hover {
      color: var(--gold);
    }

    .footer-col h4 {
      color: white;
      font-weight: 400;
      margin-bottom: 1.5rem;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }

    .footer-col ul {
      list-style: none;
    }

    .footer-col li {
      margin-bottom: 0.8rem;
    }

    .footer-col a {
      color: #ddd6cb;
      text-decoration: none;
      transition: color 0.2s;
      font-size: 0.95rem;
    }

    .footer-col a:hover {
      color: var(--gold);
    }

    .copyright {
      text-align: center;
      padding-top: 3rem;
      margin-top: 2rem;
      border-top: 1px solid rgba(198, 164, 92, 0.2);
      font-size: 0.9rem;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }
      .hero-image {
        min-height: 280px;
      }
      .craft-grid {
        grid-template-columns: 1fr;
      }
      .footer-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .footer-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header is already correct with mobile menu button -->
  <header>
    <div class="container navbar">
      <a href="index.html" class="logo">
        <img src="assets/image.png" alt="Harmony Rest" class="logo-img">
      </a>
      
      <!-- Mobile menu button (hamburger) -->
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
      
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="active">home</a></li>
        <li><a href="products.html">beds</a></li>
        <li><a href="about.html">craft</a></li>
        <li><a href="contact.html">contact</a></li>
      </ul>
    </div>
  </header>

  <!-- Rest of your content remains the same -->
  <main>
    <!-- ... your existing main content ... -->
  </main>

  <footer>
    <!-- ... your existing footer ... -->
  </footer>

  <script>
    (function() {
      // Newsletter form handler
      const form = document.getElementById('newsletterForm');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          const emailInput = form.querySelector('input[type="email"]');
          const email = emailInput.value.trim();
          if (email) {
            alert('✨ Thank you for subscribing! A golden sleep guide will land in your inbox soon.');
            emailInput.value = '';
          } else {
            alert('Please enter a valid email address.');
          }
        });
      }

      // Mobile menu functionality
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const navLinks = document.getElementById('navLinks');
      const body = document.body;

      if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', function() {
          navLinks.classList.toggle('active');
          body.classList.toggle('menu-open');
          
          const icon = this.querySelector('i');
          if (navLinks.classList.contains('active')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
          } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
          }
        });

        // Close menu when clicking on a link
        navLinks.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('active');
            body.classList.remove('menu-open');
            const icon = mobileMenuBtn.querySelector('i');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
          });
        });

        // Handle window resize
        window.addEventListener('resize', function() {
          if (window.innerWidth > 768) {
            navLinks.classList.remove('active');
            body.classList.remove('menu-open');
            const icon = mobileMenuBtn.querySelector('i');
            if (icon) {
              icon.classList.remove('fa-times');
              icon.classList.add('fa-bars');
            }
          }
        });
      }

      // Active nav link highlight
      const currentLocation = window.location.pathname.split('/').pop() || 'index.html';
      const navLinkItems = document.querySelectorAll('.nav-links a');
      navLinkItems.forEach(link => {
        const href = link.getAttribute('href');
        if (href === currentLocation || (currentLocation === '' && href === 'index.html')) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    })();
  </script>
</body>
</html>
